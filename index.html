  <body>
    <div id="root"></div>
    <!-- Set --app-height synchronously before React mounts.
         window.innerHeight is the only reliable source of truth for the
         actual visual viewport height on iOS Safari PWA standalone mode.
         All CSS viewport units (dvh/svh/vh) can be miscalculated. -->
    <script>
      (function () {
        function setH() {
          document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
        }
        setH();
        window.addEventListener('resize', setH);
      })();
    </script>
  </body>
